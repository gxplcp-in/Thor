name: Rebrand, Inject AdMob, and Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  NEW_PACKAGE: com.nexus.appforge
  NEW_APP_NAME: "AppForge Manager"
  ADMOB_APP_ID: "ca-app-pub-2804137706627200~6481242898"
  ADMOB_BANNER_ID: "ca-app-pub-2804137706627200/8125497050"
  ADMOB_INTERSTITIAL_ID: "ca-app-pub-2804137706627200/4152638624"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ---------------------------------------------------------------------
      # ONE atomic script does the whole rebrand + AdMob injection.
      # It treats each source file's REAL folder location as the source of
      # truth for its package (never trusts text-matching alone), so the
      # class Gradle compiles always matches where it physically lives.
      # ---------------------------------------------------------------------
      - name: Rebrand package, app name, and inject AdMob
        run: |
          cat > /tmp/rebrand.py << 'PYEOF'
          import os, re, shutil, sys, glob

          REPO = os.getcwd()
          NEW_PACKAGE = os.environ["NEW_PACKAGE"]
          NEW_PATH = NEW_PACKAGE.replace('.', os.sep)
          NEW_APP_NAME = os.environ["NEW_APP_NAME"]
          ADMOB_APP_ID = os.environ["ADMOB_APP_ID"]
          BANNER_ID = os.environ["ADMOB_BANNER_ID"]
          INTERSTITIAL_ID = os.environ["ADMOB_INTERSTITIAL_ID"]
          ADS_VERSION = "23.6.0"
          SKIP_DIRS = {'.git', 'build', '.gradle', '.idea', 'node_modules'}

          def log(msg):
              print(f"[rebrand] {msg}", flush=True)

          def walk(root):
              for r, dirs, files in os.walk(root):
                  dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
                  yield r, dirs, files

          # ---------------------------------------------------------------
          # STEP A: detect the OLD namespace directly from build.gradle(.kts)
          # or the manifest, BEFORE anything is modified. This is the same
          # detection that correctly found the app id last time, so we trust
          # it and use it as the single source of truth for the move below -
          # no more "walk down and guess the folder shape" heuristics.
          # ---------------------------------------------------------------
          def detect_old_namespace():
              for pattern in ('**/app/build.gradle.kts', '**/app/build.gradle'):
                  for fp in glob.glob(os.path.join(REPO, pattern), recursive=True):
                      try:
                          text = open(fp, encoding='utf-8').read()
                      except Exception:
                          continue
                      m = re.search(r'namespace\s*=?\s*"([\w.]+)"', text)
                      if m:
                          return m.group(1), fp, 'namespace'
              for pattern in ('**/app/build.gradle.kts', '**/app/build.gradle'):
                  for fp in glob.glob(os.path.join(REPO, pattern), recursive=True):
                      try:
                          text = open(fp, encoding='utf-8').read()
                      except Exception:
                          continue
                      m = re.search(r'applicationId\s*=?\s*"([\w.]+)"', text)
                      if m:
                          return m.group(1), fp, 'applicationId'
              for r, dirs, files in walk(REPO):
                  if 'AndroidManifest.xml' in files:
                      fp = os.path.join(r, 'AndroidManifest.xml')
                      text = open(fp, encoding='utf-8').read()
                      m = re.search(r'package="([\w.]+)"', text)
                      if m:
                          return m.group(1), fp, 'manifest package attr'
              return None, None, None

          old_namespace, detected_from, detected_via = detect_old_namespace()
          if not old_namespace:
              log("ERROR: could not detect the existing package/namespace from "
                  "build.gradle(.kts) or AndroidManifest.xml.")
              sys.exit(1)
          log(f"Detected old namespace: '{old_namespace}' (from {detected_from}, via {detected_via})")

          if old_namespace == NEW_PACKAGE:
              log("Old namespace already matches the target package - nothing to move.")

          old_path = old_namespace.replace('.', os.sep)

          # Shared boundary-safe pattern for the old namespace, used by every
          # later step (global text replace, schema dir rename, leftover scan)
          # so detection stays perfectly consistent throughout the script.
          old_ns_pattern = (
              re.compile(re.escape(old_namespace) + r'(?![A-Za-z0-9_])')
              if old_namespace != NEW_PACKAGE else None
          )

          # ---------------------------------------------------------------
          # STEP B: find every java/kotlin source root, and for each one
          # that contains root/<old_path>, move that EXACT directory to
          # root/<new_path>. Deterministic - no guessing involved.
          # ---------------------------------------------------------------
          def find_source_roots():
              roots = []
              for r, dirs, files in walk(REPO):
                  base = os.path.basename(r)
                  grandparent = os.path.basename(os.path.dirname(os.path.dirname(r)))
                  if base in ('java', 'kotlin') and grandparent == 'src':
                      roots.append(r)
              return roots

          source_roots = find_source_roots()
          if not source_roots:
              log("ERROR: no src/*/java or src/*/kotlin directories found.")
              sys.exit(1)
          log(f"Found {len(source_roots)} source root(s): {source_roots}")

          moved_count = 0
          moved_dirs = []  # (source_root, new_dir) pairs that were actually moved -
                            # STEP C below touches ONLY these, never unrelated
                            # modules (e.g. vm-runtime's sun.misc / dalvik.system
                            # stub files) that happen to share the repo.
          if old_namespace != NEW_PACKAGE:
              for root in source_roots:
                  old_dir = os.path.join(root, old_path)
                  new_dir = os.path.join(root, NEW_PATH)

                  if not os.path.isdir(old_dir):
                      log(f"  {root}: no '{old_path}' subfolder here, skipping")
                      continue

                  log(f"  found old package folder: {old_dir}")
                  os.makedirs(os.path.dirname(new_dir), exist_ok=True)

                  try:
                      if os.path.exists(new_dir):
                          for item in os.listdir(old_dir):
                              src_item = os.path.join(old_dir, item)
                              dest_item = os.path.join(new_dir, item)
                              if os.path.exists(dest_item):
                                  if os.path.isdir(dest_item):
                                      shutil.rmtree(dest_item)
                                  else:
                                      os.remove(dest_item)
                              shutil.move(src_item, dest_item)
                          shutil.rmtree(old_dir, ignore_errors=True)
                      else:
                          shutil.move(old_dir, new_dir)
                  except Exception as e:
                      log(f"ERROR: failed to move {old_dir} -> {new_dir}: {e}")
                      sys.exit(1)

                  if not os.path.isdir(new_dir):
                      log(f"ERROR: move reported success but {new_dir} does not exist.")
                      sys.exit(1)

                  log(f"  MOVED: {old_dir} -> {new_dir}")
                  moved_count += 1
                  moved_dirs.append((root, new_dir))

                  # remove now-empty leftover parent chain (old top-level package dirs)
                  parent = os.path.dirname(old_dir)
                  root_abs = os.path.abspath(root)
                  while os.path.abspath(parent) != root_abs and os.path.abspath(parent).startswith(root_abs):
                      try:
                          if not os.listdir(parent):
                              empty_dir = parent
                              parent = os.path.dirname(parent)
                              os.rmdir(empty_dir)
                          else:
                              break
                      except Exception:
                          break

          if old_namespace != NEW_PACKAGE and moved_count == 0:
              log(f"ERROR: old package folder '{old_path}' was not found under any "
                  f"of {source_roots}. Directory tree for debugging:")
              for root in source_roots:
                  for r, dirs, files in walk(root):
                      depth = r[len(root):].count(os.sep)
                      log(f"    {'  ' * depth}{os.path.relpath(r, root)}/")
              sys.exit(1)

          # ---------------------------------------------------------------
          # STEP C: rewrite the package line of files INSIDE THE MOVED
          # DIRECTORY ONLY, to match their real location on disk. This is
          # deliberately scoped to moved_dirs (not every source root in the
          # repo) so other modules - e.g. a vm-runtime module shipping
          # sun.misc.Unsafe / dalvik.system.VMRuntime stub files - are never
          # touched, since their package never matched old_namespace to
          # begin with and rewriting them would corrupt legitimate stubs.
          #
          # Also: Java REQUIRES a trailing semicolon after "package x.y;" -
          # Kotlin does not. Stripping it (as a previous version of this
          # script did) breaks javac with "';' expected". We preserve it
          # here based on file extension.
          # ---------------------------------------------------------------
          fixed_pkg_count = 0
          for root, new_dir in moved_dirs:
              for r, dirs, files in walk(new_dir):
                  for f in files:
                      if not f.endswith(('.kt', '.java')):
                          continue
                      fp = os.path.join(r, f)
                      rel_dir = os.path.relpath(r, root)
                      correct_pkg = NEW_PACKAGE if rel_dir == '.' else rel_dir.replace(os.sep, '.')
                      semi = ';' if fp.endswith('.java') else ''
                      try:
                          text = open(fp, encoding='utf-8').read()
                      except Exception as e:
                          log(f"  WARNING: could not read {fp}: {e}")
                          continue
                      new_text, n = re.subn(
                          r'^\s*package\s+[\w.]+\s*;?\s*$',
                          f'package {correct_pkg}{semi}',
                          text, count=1, flags=re.MULTILINE
                      )
                      if n == 0:
                          new_text = f'package {correct_pkg}{semi}\n\n' + text
                      if new_text != text:
                          open(fp, 'w', encoding='utf-8').write(new_text)
                          fixed_pkg_count += 1
          log(f"Corrected package declarations in {fixed_pkg_count} file(s) "
              f"(scoped to moved directories only).")

          # ---------------------------------------------------------------
          # STEP D: global textual cleanup - fix any remaining references to
          # the OLD namespace ANYWHERE in the repo: imports, gradle files,
          # AndroidManifest.xml (including a fully-qualified Hilt
          # @HiltAndroidApp Application class name, e.g.
          # android:name="com.valhalla.thor.MyApp"), Room/Hilt annotation
          # arguments (e.g. room.schemaLocation paths in build.gradle),
          # and any other .kt/.java file in the repo regardless of which
          # module it lives in - not just the moved directory.
          #
          # Boundary-safe: replaces "com.valhalla.thor" but will NOT touch
          # an unrelated sibling package like "com.valhalla.thorlib" that
          # merely starts with the same characters.
          # ---------------------------------------------------------------
          TEXT_EXT = ('.kt', '.java', '.xml', '.gradle', '.kts', '.pro', '.properties', '.cfg')
          if old_namespace and old_namespace != NEW_PACKAGE:
              replaced_count = 0
              touched_files = []
              for r, dirs, files in walk(REPO):
                  for f in files:
                      if f.endswith(TEXT_EXT):
                          fp = os.path.join(r, f)
                          try:
                              text = open(fp, encoding='utf-8').read()
                          except Exception:
                              continue
                          new_text, n = old_ns_pattern.subn(NEW_PACKAGE, text)
                          if n:
                              open(fp, 'w', encoding='utf-8').write(new_text)
                              replaced_count += 1
                              touched_files.append((fp, n))
              log(f"Replaced remaining '{old_namespace}' references in {replaced_count} file(s):")
              for fp, n in touched_files:
                  log(f"    {fp}  ({n} occurrence(s))")

          # ---------------------------------------------------------------
          # STEP D2: explicitly confirm the Application class referenced by
          # AndroidManifest.xml's <application android:name=...> now points
          # at the new package (covers Hilt's @HiltAndroidApp Application
          # subclass, which is commonly declared fully-qualified there).
          # ---------------------------------------------------------------
          for r, dirs, files in walk(REPO):
              if 'AndroidManifest.xml' in files:
                  fp = os.path.join(r, 'AndroidManifest.xml')
                  text = open(fp, encoding='utf-8').read()
                  m = re.search(r'<application[^>]*\sandroid:name="([^"]+)"', text)
                  if m:
                      app_name_attr = m.group(1)
                      if app_name_attr.startswith('.'):
                          log(f"  {fp}: <application> android:name=\"{app_name_attr}\" is relative - "
                              f"resolves against namespace, already correct.")
                      elif old_namespace and old_namespace in app_name_attr:
                          log(f"  WARNING: {fp}: <application> android:name=\"{app_name_attr}\" "
                              f"still references the old namespace after cleanup - check manually.")
                      else:
                          log(f"  {fp}: <application> android:name=\"{app_name_attr}\" looks correct.")

          # ---------------------------------------------------------------
          # STEP D3: rename Room auto-migration schema directories.
          #
          # Room's schema exporter (ksp { arg("room.schemaLocation", ...) })
          # writes one folder PER @Database class under e.g. app/schemas/,
          # and that folder is named with the database's FULLY-QUALIFIED
          # CLASS NAME using DOTS, not a nested path -
          # e.g. "app/schemas/com.valhalla.thor.data.source.local.room.AppDatabase/2.json"
          # This lives outside src/, so the src/-only directory move in
          # Step B never touches it. Auto-migrations fail if this folder's
          # name still points at the old package. We rename any directory
          # directly under a folder named "schemas" whose name matches the
          # old namespace, wherever "schemas" appears in the repo.
          # ---------------------------------------------------------------
          if old_namespace and old_namespace != NEW_PACKAGE:
              schema_dirs_to_rename = []
              for r, dirs, files in walk(REPO):
                  if os.path.basename(r) == 'schemas':
                      for d in dirs:
                          if old_ns_pattern.search(d):
                              schema_dirs_to_rename.append((r, d))

              schema_renamed = 0
              for r, d in schema_dirs_to_rename:
                  old_full = os.path.join(r, d)
                  new_name = old_ns_pattern.sub(NEW_PACKAGE, d)
                  new_full = os.path.join(r, new_name)
                  if not os.path.isdir(old_full):
                      continue
                  try:
                      if os.path.exists(new_full):
                          for item in os.listdir(old_full):
                              dest = os.path.join(new_full, item)
                              if os.path.exists(dest):
                                  shutil.rmtree(dest) if os.path.isdir(dest) else os.remove(dest)
                              shutil.move(os.path.join(old_full, item), dest)
                          shutil.rmtree(old_full, ignore_errors=True)
                      else:
                          shutil.move(old_full, new_full)
                  except Exception as e:
                      log(f"ERROR: failed to rename schema dir {old_full} -> {new_full}: {e}")
                      sys.exit(1)
                  log(f"  renamed Room schema dir: {old_full} -> {new_full}")
                  schema_renamed += 1

              if schema_renamed:
                  log(f"Renamed {schema_renamed} Room schema director{'y' if schema_renamed == 1 else 'ies'}.")
              else:
                  log("No Room schema directories needed renaming (none found, or project has no schemas/ folder).")

          # ---------------------------------------------------------------
          # STEP E: force namespace / applicationId in build.gradle(.kts),
          # and strip any applicationIdSuffix so the final ID is EXACTLY
          # NEW_PACKAGE with no ".debug" style suffix appended.
          # ---------------------------------------------------------------
          app_gradle_candidates = glob.glob(os.path.join(REPO, '**/app/build.gradle.kts'), recursive=True) + \
                                   glob.glob(os.path.join(REPO, '**/app/build.gradle'), recursive=True)
          app_gradle = app_gradle_candidates[0] if app_gradle_candidates else None

          if app_gradle:
              content = open(app_gradle, encoding='utf-8').read()

              content, n1 = re.subn(r'namespace\s*=?\s*"[\w.]+"', f'namespace = "{NEW_PACKAGE}"' if app_gradle.endswith('.kts') else f'namespace "{NEW_PACKAGE}"', content)
              content, n2 = re.subn(r'applicationId\s*=?\s*"[\w.]+"', f'applicationId = "{NEW_PACKAGE}"' if app_gradle.endswith('.kts') else f'applicationId "{NEW_PACKAGE}"', content)
              content, n3 = re.subn(r'^\s*applicationIdSuffix\s*=?\s*"[^"]*"\s*$', '', content, flags=re.MULTILINE)

              if 'play-services-ads' not in content:
                  is_kts = app_gradle.endswith('.kts')
                  dep_line = (
                      f'    implementation("com.google.android.gms:play-services-ads:{ADS_VERSION}")'
                      if is_kts else
                      f"    implementation 'com.google.android.gms:play-services-ads:{ADS_VERSION}'"
                  )
                  content, nd = re.subn(r'(dependencies\s*\{)', r'\1\n' + dep_line, content, count=1)
                  log(f"  AdMob dependency added: {bool(nd)}")

              open(app_gradle, 'w', encoding='utf-8').write(content)
              log(f"Updated {app_gradle} (namespace matched: {n1}, applicationId matched: {n2}, "
                  f"applicationIdSuffix lines removed: {n3})")
          else:
              log("ERROR: could not find app/build.gradle or app/build.gradle.kts")
              sys.exit(1)

          # ---------------------------------------------------------------
          # STEP F: AndroidManifest.xml - package attr, INTERNET permission,
          # AdMob App ID meta-data.
          # ---------------------------------------------------------------
          manifest = None
          for r, dirs, files in walk(REPO):
              if 'AndroidManifest.xml' in files and os.path.join('src', 'main') in r:
                  manifest = os.path.join(r, 'AndroidManifest.xml')
                  break
          if not manifest:
              for r, dirs, files in walk(REPO):
                  if 'AndroidManifest.xml' in files:
                      manifest = os.path.join(r, 'AndroidManifest.xml')
                      break

          if manifest:
              content = open(manifest, encoding='utf-8').read()

              content = re.sub(r'package="[\w.]+"', f'package="{NEW_PACKAGE}"', content)

              if 'android.permission.INTERNET' not in content:
                  content = re.sub(
                      r'(<application)',
                      '    <uses-permission android:name="android.permission.INTERNET" />\n\n\\1',
                      content, count=1
                  )

              if 'com.google.android.gms.ads.APPLICATION_ID' not in content:
                  meta = (
                      '        <meta-data\n'
                      '            android:name="com.google.android.gms.ads.APPLICATION_ID"\n'
                      f'            android:value="{ADMOB_APP_ID}" />\n'
                  )
                  content = re.sub(r'(\s*</application>)', '\n' + meta + r'\1', content, count=1)

              open(manifest, 'w', encoding='utf-8').write(content)
              log(f"Updated manifest: {manifest}")
          else:
              log("ERROR: no AndroidManifest.xml found")
              sys.exit(1)

          # ---------------------------------------------------------------
          # STEP G: strings.xml app_name
          # ---------------------------------------------------------------
          strings_updated = 0
          for r, dirs, files in walk(REPO):
              for f in files:
                  if f == 'strings.xml':
                      fp = os.path.join(r, f)
                      text = open(fp, encoding='utf-8').read()
                      new_text, n = re.subn(
                          r'(<string name="app_name">)(.*?)(</string>)',
                          lambda m: m.group(1) + NEW_APP_NAME + m.group(3),
                          text
                      )
                      if n:
                          open(fp, 'w', encoding='utf-8').write(new_text)
                          strings_updated += 1
          log(f"Updated app_name in {strings_updated} strings.xml file(s).")

          # ---------------------------------------------------------------
          # STEP H: inject AdMob into HomeActivity.kt (now at its NEW path)
          # ---------------------------------------------------------------
          home_activity = None
          for r, dirs, files in walk(REPO):
              if 'HomeActivity.kt' in files:
                  home_activity = os.path.join(r, 'HomeActivity.kt')
                  break

          if not home_activity:
              log("ERROR: HomeActivity.kt not found anywhere in the repo after rebrand.")
              sys.exit(1)

          expected_dir = os.path.join(NEW_PATH)
          if expected_dir not in home_activity.replace(os.sep, os.sep):
              log(f"WARNING: HomeActivity.kt found at {home_activity}, which does not "
                  f"look like it's under the new package path ({NEW_PATH}). Continuing anyway.")

          content = open(home_activity, encoding='utf-8').read()

          imports_needed = [
              "import com.google.android.gms.ads.AdRequest",
              "import com.google.android.gms.ads.AdSize",
              "import com.google.android.gms.ads.AdView",
              "import com.google.android.gms.ads.MobileAds",
              "import com.google.android.gms.ads.LoadAdError",
              "import com.google.android.gms.ads.interstitial.InterstitialAd",
              "import com.google.android.gms.ads.interstitial.InterstitialAdLoadCallback",
              "import android.view.ViewGroup",
          ]
          missing = [i for i in imports_needed if i not in content]
          if missing:
              block = "\n".join(missing) + "\n"
              new_content, n = re.subn(r'(^package [\w.]+\n)', r'\1\n' + block, content, count=1, flags=re.MULTILINE)
              content = new_content if n else block + content

          if 'MobileAds.initialize' not in content:
              init_block = f'''
              MobileAds.initialize(this) {{}}

              val appForgeAdView = AdView(this)
              appForgeAdView.adUnitId = "{BANNER_ID}"
              appForgeAdView.setAdSize(AdSize.BANNER)
              addContentView(
                  appForgeAdView,
                  ViewGroup.LayoutParams(
                      ViewGroup.LayoutParams.MATCH_PARENT,
                      ViewGroup.LayoutParams.WRAP_CONTENT
                  )
              )
              appForgeAdView.loadAd(AdRequest.Builder().build())

              var appForgeInterstitialAd: InterstitialAd? = null
              InterstitialAd.load(
                  this,
                  "{INTERSTITIAL_ID}",
                  AdRequest.Builder().build(),
                  object : InterstitialAdLoadCallback() {{
                      override fun onAdLoaded(ad: InterstitialAd) {{
                          appForgeInterstitialAd = ad
                      }}
                      override fun onAdFailedToLoad(adError: LoadAdError) {{
                          appForgeInterstitialAd = null
                      }}
                  }}
              )
          '''
              # A plain regex like setContentView\([^)]*\) cannot handle nested
              # parens - it either matches a simple call or safely fails to
              # match at all (it can never produce a corrupting partial match,
              # since it requires whitespace immediately after the paren it
              # captures). But it silently misses very common real-world
              # calls like setContentView(SomeBinding.inflate(layoutInflater).root),
              # falling back to a less ideal insertion point. We use a real
              # balanced-paren scan instead, so the full call - nested parens
              # and all - is found correctly.
              def find_call_end(text, call_name):
                  idx = text.find(call_name + '(')
                  if idx == -1:
                      return None
                  open_idx = idx + len(call_name)
                  depth = 0
                  i = open_idx
                  while i < len(text):
                      if text[i] == '(':
                          depth += 1
                      elif text[i] == ')':
                          depth -= 1
                          if depth == 0:
                              # include trailing whitespace up to and including
                              # the next newline, matching the old regex's \s*\n
                              j = i + 1
                              while j < len(text) and text[j] in ' \t':
                                  j += 1
                              if j < len(text) and text[j] == '\n':
                                  j += 1
                              return j
                      i += 1
                  return None  # unbalanced parens in the source file itself

              insert_at = find_call_end(content, 'setContentView')
              insertion_label = 'after setContentView(...)'
              if insert_at is None:
                  insert_at = find_call_end(content, 'super.onCreate')
                  insertion_label = 'after super.onCreate(...)'

              if insert_at is not None:
                  new_content = content[:insert_at] + init_block + content[insert_at:]
                  content = new_content
                  log(f"Injected AdMob init code into {home_activity} ({insertion_label})")
              else:
                  log(f"ERROR: could not find setContentView() or super.onCreate() "
                      f"in {home_activity} - ad code NOT inserted (avoiding a crash).")
                  sys.exit(1)

              # Safety net: verify the file is still brace/paren-balanced after
              # injection. If not, something about this specific file's shape
              # broke our insertion - fail here with a clear message instead of
              # letting a CompilationErrorException surface three steps later
              # with no indication of which file or why.
              open_b, close_b = content.count('{'), content.count('}')
              open_p, close_p = content.count('('), content.count(')')
              if open_b != close_b or open_p != close_p:
                  log(f"ERROR: {home_activity} is unbalanced after AdMob injection "
                      f"(braces {open_b}/{close_b}, parens {open_p}/{close_p}). "
                      f"Aborting rather than shipping a file that won't compile.")
                  sys.exit(1)

          open(home_activity, 'w', encoding='utf-8').write(content)

          # ---------------------------------------------------------------
          # STEP I: final leftover-reference scan. If ANY file anywhere in
          # the repo still contains the old namespace after every step
          # above, fail loudly here with exact file:line - rather than let
          # a stray import/annotation-argument reach KSP and produce an
          # opaque PROCESSING_ERROR three build steps later. This is the
          # single most useful diagnostic for Room/Hilt-related failures,
          # since KSP resolves types strictly and any leftover reference to
          # the old package is a near-certain cause.
          # ---------------------------------------------------------------
          if old_namespace and old_namespace != NEW_PACKAGE:
              leftovers = []
              leftover_paths = []
              for r, dirs, files in walk(REPO):
                  # flag any leftover directory or file NAME containing the old
                  # namespace too (e.g. an un-renamed schemas/ subfolder, or
                  # anything the schema-rename step above didn't recognize)
                  for d in dirs:
                      if old_ns_pattern.search(d):
                          leftover_paths.append(os.path.join(r, d) + '/')
                  for f in files:
                      if old_ns_pattern.search(f):
                          leftover_paths.append(os.path.join(r, f))
                  for f in files:
                      if f.endswith(TEXT_EXT):
                          fp = os.path.join(r, f)
                          try:
                              lines = open(fp, encoding='utf-8').read().split('\n')
                          except Exception:
                              continue
                          for i, line in enumerate(lines, start=1):
                              if old_ns_pattern.search(line):
                                  leftovers.append((fp, i, line.strip()))

              if leftovers or leftover_paths:
                  total = len(leftovers) + len(leftover_paths)
                  log(f"ERROR: found {total} leftover reference(s) to "
                      f"'{old_namespace}' after the rebrand - this is very likely "
                      f"what will break KSP/Room/Hilt or the build. Fix these and re-run:")
                  for p in leftover_paths:
                      log(f"    PATH: {p}")
                  for fp, i, line in leftovers:
                      log(f"    {fp}:{i}: {line}")
                  sys.exit(1)
              else:
                  log(f"Verified: no remaining references to '{old_namespace}' anywhere in the repo.")

          log("Rebrand + AdMob injection complete.")
          PYEOF
          python3 /tmp/rebrand.py

      # ---------------------------------------------------------------------
      # Fail fast if the rebrand didn't actually take - better than shipping
      # a broken APK.
      # ---------------------------------------------------------------------
      - name: Verify rebrand actually applied
        run: |
          echo "== app/build.gradle(.kts) namespace/applicationId =="
          grep -R -E "namespace|applicationId" --include="build.gradle*" . || true
          echo ""
          echo "== HomeActivity.kt location =="
          find . -name "HomeActivity.kt" -not -path "*/build/*"
          echo ""
          echo "== Any leftover old package folders under com/valhalla (if this repo used that) =="
          find . -type d -path "*com/valhalla*" -not -path "*/build/*" || true

          if ! grep -R "com.nexus.appforge" --include="build.gradle*" . > /dev/null; then
            echo "::error::New package 'com.nexus.appforge' not found in any build.gradle file - aborting."
            exit 1
          fi
          if ! find . -path "*com/nexus/appforge/HomeActivity.kt" -not -path "*/build/*" | grep -q .; then
            echo "::error::HomeActivity.kt is not located under the new package path - aborting."
            exit 1
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace --info 2>&1 | tee /tmp/gradle_build.log

      - name: Show exact compiler error lines (only runs if the build failed)
        if: failure()
        run: |
          echo "=================================================================="
          echo "Kotlin 2.x (K2) reports errors as structured 'Problem found:' blocks"
          echo "under --info, NOT classic 'e: file:line' lines - so we grep for both"
          echo "formats here plus a few lines of context around each match."
          echo "=================================================================="
          echo ""
          echo "---- structured Kotlin/KSP compiler problems (with context) ----"
          grep -n -A4 "Problem found: Kotlin compiler error\|Problem found: KSP" /tmp/gradle_build.log || \
            echo "(none found)"
          echo ""
          echo "---- classic 'e: '/'error:' lines, if any ----"
          grep -nE "^e: |error:|FAILURE: Build failed" /tmp/gradle_build.log || \
            echo "(none found)"
          echo ""
          echo "---- last 200 lines of the full build log, for context ----"
          tail -n 200 /tmp/gradle_build.log

      - name: Locate APK
        id: locate_apk
        run: |
          APK_PATH=$(find . -type f -name "*.apk" -path "*debug*" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!" >&2
            exit 1
          fi
          echo "APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AppForge-Manager-debug-apk
          path: ${{ steps.locate_apk.outputs.apk_path }}
          if-no-files-found: error

      - name: Upload full build log (always, for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle_build.log
          if-no-files-found: ignore
